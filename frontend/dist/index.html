<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="QA 社区 - 在线问答系统，分享知识，共同成长">
    <meta name="theme-color" content="#C41E3A">
    <title>QA 社区 - 在线问答系统</title>

    <!-- Google Fonts - 中文字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Highlight.js 代码高亮主题 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* 新中式配色 */
            --zh-red: #C41E3A;        /* 朱红 */
            --zh-red-light: #E57373;  /* 浅红 */
            --zh-blue: #3D5A80;       /* 青花蓝 */
            --zh-blue-light: #5A7BA6; /* 浅蓝 */
            --zh-paper: #F5F3E8;      /* 宣纸白 */
            --zh-paper-dark: #EBE8DC; /* 深纸色 */
            --zh-ink: #2C2C2C;        /* 墨黑 */
            --zh-ink-light: #5C5C5C;  /* 浅墨 */
            --zh-gold: #D4AF37;       /* 金色 */
            --zh-jade: #00A86B;       /* 翡翠绿 */

            /* 功能色 */
            --success: #00A86B;
            --warning: #D4AF37;
            --error: #C41E3A;

            /* 字体 */
            --font-serif: 'Noto Serif SC', '思源宋体', '宋体', serif;
            --font-sans: 'Noto Sans SC', '思源黑体', '微软雅黑', sans-serif;

            /* 阴影 */
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.12);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.16);

            /* 圆角 */
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--zh-paper);
            background-image:
                radial-gradient(ellipse at top, rgba(196, 30, 58, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(61, 90, 128, 0.03) 0%, transparent 50%);
            color: var(--zh-ink);
            line-height: 1.7;
            min-height: 100vh;
        }

        #app {
            min-height: 100vh;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--zh-paper-dark);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--zh-blue-light);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--zh-blue);
        }

        /* 选中文本 */
        ::selection {
            background: var(--zh-red);
            color: white;
        }
    </style>
  <script type="module" crossorigin src="/assets/index-15881f56.js"></script>
  <link rel="stylesheet" href="/assets/index-c35154ea.css">
</head>
<body>
    <div id="app"></div>
    
</body>
</html>
